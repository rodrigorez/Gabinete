<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete Virtual | Kiosk Offline</title>
    <meta name="description" content="Gabinete Virtual interativo com suporte offline PWA para quiosques">
    <meta property="og:title" content="Gabinete Virtual | Kiosk Offline">
    <meta property="og:description" content="Experiência interativa de curadoria de modelos 3D e arquivos de mídia.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="assets/images/gabinete.png">
    <link rel="apple-touch-icon" href="assets/images/gabinete.png">
    
    <!-- CSS Moderno -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- 🔴 DIAGNÓSTICO DE ERROS — REMOVER ANTES DO DEPLOY -->
    <script>
        window.addEventListener('error', function(e) {
            var banner = document.getElementById('_err_banner') || (function() {
                var b = document.createElement('div');
                b.id = '_err_banner';
                b.style = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#c0392b;color:#fff;padding:12px 16px;font:14px monospace;word-break:break-all;max-height:200px;overflow-y:auto;';
                document.body.appendChild(b);
                return b;
            })();
            banner.innerHTML += '<div>❌ ' + (e.filename || '').replace(/.*\//, '') + ':' + e.lineno + ' — ' + (e.message || e) + '</div>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            var banner = document.getElementById('_err_banner') || (function() {
                var b = document.createElement('div');
                b.id = '_err_banner';
                b.style = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#c0392b;color:#fff;padding:12px 16px;font:14px monospace;word-break:break-all;max-height:200px;overflow-y:auto;';
                document.body.appendChild(b);
                return b;
            })();
            banner.innerHTML += '<div>❌ Promise — ' + (e.reason || '') + '</div>';
        });
    </script>

    <!-- Core Local do A-Frame carregado de forma síncrona (Previne erro AFRAME is not defined) -->
    <script src="js/vendor/aframe.min.js"></script>

    <!-- Lógica de Ponto Único (ES Modules) -->
    <script type="module" src="js/main.js" defer></script>

    <!-- Registro do Service Worker para Modo Offline PWA -->
    <!-- type:'module' necessário pois sw.js usa ESM imports (Workbox bundlado localmente) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { type: 'module' }).then(reg => {
                    console.log('✅ Service Worker Registrado com sucesso!', reg.scope);
                }).catch(err => {
                    console.warn('⚠️ Falha ao registrar Service Worker:', err);
                });
            });
        }
    </script>
</head>
<body>

    <!-- Splash Screen (Loader) -->
    <!-- Ele renderizará Instantaneamente agora, pois não há bloqueio JS CDN no HEAD -->
    <div id="splash-screen">
        <div id="splash-logo" data-i18n="APP_TITLE">Gabinete Virtual</div>
        <div class="loader-bar">
            <div id="loader-progress" class="loader-progress"></div>
        </div>
        <p style="margin-top: 15px; font-size: 0.9rem; opacity: 0.7;" data-i18n="LOADING">Carregando Experiência PWA...</p>
    </div>

    <!-- Cena A-Frame com Cursor em Mouse/Touch -->
    <!-- Cena A-Frame com Cursor em Mouse/Touch -->
    <a-scene 
        hardware-profiler 
        renderer="colorManagement: true; antialias: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: [interactive-object], .clickable; interval: 100"
        vr-mode-ui="enabled: false"
        hidden>
        
        <!-- Botão Customizado de Fullscreen Híbrido (Área Invisível de 3 Toques) -->
        <!-- Como solicitado, funcionalidade protegida contra usuários leigos. -->
        <div id="custom-fs-btn" style="position: absolute; top: 0; right: 0; width: 15vw; height: 15vh; z-index: 10005;"></div>

        <!-- Mobile Joystick (Oculto por padrão, ativado apenas em touch) -->
        <div id="mobile-joystick-zone" style="display: none; position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 10000; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); touch-action: none;">
            <div id="mobile-joystick-knob" style="position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(0, 209, 255, 0.6); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 15px rgba(0,209,255,0.5);"></div>
        </div>

        <!-- Interface Multimídia 16:9 (Overlay 2D) -->
        <div id="info-panel" class="multimedia-panel" style="display: none;">
            <div class="panel-container">
                <!-- Top Section: Título e Fechar -->
                <div class="panel-header">
                    <h2 id="info-title">Título</h2>
                    <button id="info-close-btn" class="btn-close">×</button>
                </div>

                <!-- Main Grid 16:9 -->
                <div class="panel-main">
                    <!-- Lateral: Navegação (Zona Verde - 1/6 Largura) -->
                    <div class="panel-sidebar">
                        <button id="btn-gallery-1" class="btn-nav-side">Galeria A</button>
                        <button id="btn-gallery-2" class="btn-nav-side">Galeria B</button>
                        <button id="btn-video" class="btn-nav-side">Vídeos</button>
                        <button id="btn-text" class="btn-nav-side">Documentos</button>
                    </div>

                    <!-- Centro: Conteúdo (Vídeo ou Imagem) -->
                    <div class="panel-stage">
                        <div id="video-container" class="stage-wrapper" style="display: none;"></div>
                        <div id="dynamic-content" class="stage-wrapper"></div>
                    </div>
                </div>

                <!-- Bottom Section: Controles Contextuais (Zona Azul - 1/6 Altura) -->
                <div class="panel-footer">
                    <!-- Controles de Vídeo (Aparecem só com vídeo) -->
                    <div id="video-controls" class="controls-group" style="display: none;">
                        <button id="video-toggle" class="btn-ctrl">Play</button>
                        <button id="video-stop" class="btn-ctrl">Stop</button>
                    </div>
                    <!-- Controles de Carrossel (Aparecem só com galeria) -->
                    <div id="carousel-controls" class="controls-group" style="display: none;">
                        <button id="prev-btn" class="btn-nav">← Anterior</button>
                        <button id="next-btn" class="btn-nav">Próxima →</button>
                    </div>
                </div>
            </div>
        </div>
        
        <a-assets id="asset-manager"></a-assets>
        <a-entity id="scene-container"></a-entity>

        <a-sky id="main-sky" src="" rotation="0 -90 0"></a-sky>
        <a-entity id="ambient-light" light="type: ambient; intensity: 0.6"></a-entity>
        <a-entity light="type: directional; intensity: 0.5" position="-1 2 1"></a-entity>

        <!-- Piso do Museu (Kiosk Gravity) -->
        <a-plane id="floor" rotation="-90 0 0" width="100" height="100" material="color: #111; roughness: 1.0; src: #;"></a-plane>

        <!-- Câmera de Kiosk (Movimentação WASD e Kiosk-Physics Atrelados) -->
        <a-entity id="rig" position="0 0 0">
            <a-entity camera look-controls wasd-controls="acceleration: 15" kiosk-physics position="0 1.6 0"></a-entity>
        </a-entity>
    </a-scene>

</body>
</html>
